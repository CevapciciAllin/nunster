<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nunster Player</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --black: #0a0a0a;
  --dark: #111;
  --surface: #1c1c1c;
  --border: #2a2a2a;
  --red: #e63946;
  --yellow: #f4a261;
  --white: #f0ede8;
  --muted: #666;
  --font-display: 'Bebas Neue', 'Arial Black', sans-serif;
  --font-body: 'DM Sans', system-ui, sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--black); color: var(--white); font-family: var(--font-body); overflow: hidden; }

.screen {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
  transition: opacity 0.25s, transform 0.25s;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.97); }

/* ── HOME ── */
#screen-home { background: var(--black); gap: 0; }
.home-logo { font-family: var(--font-display); font-size: clamp(64px,18vw,96px); letter-spacing: 0.06em; line-height: 0.9; text-align: center; }
.home-logo span { color: var(--red); }
.home-sub { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-top: 8px; margin-bottom: 48px; }

.btn-scan {
  background: var(--red); color: #fff; border: none; border-radius: 3px;
  padding: 18px 48px; font-family: var(--font-display); font-size: 28px;
  letter-spacing: 0.1em; cursor: pointer; display: flex; align-items: center; gap: 12px;
  transition: background 0.15s;
}
.btn-scan:active { background: #c8303c; }

.home-hint { margin-top: 28px; font-size: 11px; color: var(--muted); text-align: center; line-height: 1.8; }

.manual-section { width: 100%; margin-top: 28px; display: flex; gap: 8px; max-width: 380px; }
.manual-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  color: var(--white); border-radius: 3px; padding: 10px 12px; font-size: 13px; outline: none;
}
.manual-input:focus { border-color: var(--red); }
.manual-input::placeholder { color: var(--muted); }
.btn-go {
  background: var(--surface); border: 1px solid var(--border); color: var(--white);
  border-radius: 3px; padding: 10px 16px; font-size: 13px; cursor: pointer;
}
.btn-go:hover { border-color: var(--red); }

/* ── SCAN ── */
#screen-scan { background: var(--black); padding: 0; justify-content: flex-start; }
.scan-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; flex-shrink: 0; }
.scan-header-title { font-family: var(--font-display); font-size: 22px; letter-spacing: 0.1em; }
.btn-back { background: var(--surface); border: 1px solid var(--border); color: var(--white); border-radius: 3px; padding: 8px 16px; font-size: 13px; cursor: pointer; }

.camera-container { position: relative; width: 100%; flex: 1; overflow: hidden; background: #000; }
#camera-video { width: 100%; height: 100%; object-fit: cover; display: block; }
#qr-canvas { display: none; }

.scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
.scan-frame { width: min(70vw,260px); height: min(70vw,260px); position: relative; }
.scan-frame::before, .scan-frame::after, .scan-frame .c1, .scan-frame .c2 {
  content: ''; position: absolute; width: 32px; height: 32px; border-color: var(--red); border-style: solid;
}
.scan-frame::before { top:0;left:0; border-width: 3px 0 0 3px; }
.scan-frame::after  { top:0;right:0; border-width: 3px 3px 0 0; }
.scan-frame .c1     { bottom:0;right:0; border-width: 0 3px 3px 0; }
.scan-frame .c2     { bottom:0;left:0; border-width: 0 0 3px 3px; }
.scan-line { position: absolute; left:3px; right:3px; height:2px; background: linear-gradient(90deg,transparent,var(--red),transparent); animation: scanline 2s ease-in-out infinite; }
@keyframes scanline { 0%{top:3px;opacity:1} 50%{top:calc(100% - 5px);opacity:.6} 100%{top:3px;opacity:1} }

.scan-status { position: absolute; bottom: 20px; left:0; right:0; text-align:center; font-size:12px; letter-spacing:.1em; text-transform:uppercase; color:rgba(255,255,255,.5); padding: 0 16px; }

/* debug bar – visible on screen, hidden in normal flow */
#debug-bar {
  position: absolute; top: 0; left: 0; right: 0;
  background: rgba(0,0,0,0.75); color: #0f0; font-size: 10px;
  padding: 4px 8px; word-break: break-all; z-index: 99;
  display: none;
}

/* ── PLAYER ── */
#screen-player { background: var(--black); justify-content: flex-start; padding: 0; }
.player-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; flex-shrink: 0; }
.player-header-title { font-family: var(--font-display); font-size: 22px; letter-spacing: .1em; }
.btn-new { background: var(--surface); border: 1px solid var(--border); color: var(--white); border-radius: 3px; padding: 8px 16px; font-size: 13px; cursor: pointer; }

.player-content { flex: 1; width: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px 20px 24px; gap: 14px; overflow-y: auto; }

.embed-wrap { width: 100%; border-radius: 8px; overflow: hidden; background: #000; flex-shrink: 0; }
.embed-wrap iframe { width: 100%; border: none; display: block; }
.yt-wrap { width: 100%; border-radius: 8px; overflow: hidden; background: #000; aspect-ratio: 16/9; flex-shrink: 0; }
.yt-wrap iframe { width: 100%; height: 100%; border: none; display: block; }

.reveal-card { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.reveal-hidden { padding: 28px 20px; text-align: center; cursor: pointer; user-select: none; }
.reveal-hidden:active { background: #222; }
.reveal-eye { font-size: 36px; display: block; margin-bottom: 10px; filter: grayscale(1) opacity(.5); }
.reveal-cta { font-family: var(--font-display); font-size: 20px; letter-spacing: .1em; color: var(--muted); }
.reveal-sub { font-size: 11px; color: #444; margin-top: 6px; letter-spacing: .08em; text-transform: uppercase; }

.reveal-shown { display: none; padding: 24px 20px; text-align: center; animation: fadeUp .4s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.reveal-artist { font-size: 12px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
.reveal-year { font-family: var(--font-display); font-size: clamp(64px,18vw,88px); color: var(--yellow); line-height: 1; letter-spacing: .04em; }
.reveal-divider { width: 40px; height: 2px; background: var(--red); margin: 12px auto; }
.reveal-title { font-size: 15px; font-style: italic; color: var(--white); opacity: .85; }

.btn-next { width: 100%; background: var(--red); color: #fff; border: none; border-radius: 3px; padding: 16px; font-family: var(--font-display); font-size: 24px; letter-spacing: .1em; cursor: pointer; flex-shrink: 0; }
.btn-next:active { background: #c8303c; }

.url-display { width: 100%; font-size: 10px; color: #333; text-align: center; word-break: break-all; padding: 0 8px; }

.no-embed-box {
  width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 24px 20px; text-align: center; flex-shrink: 0;
}
.no-embed-box p { color: var(--muted); font-size: 13px; margin-bottom: 16px; line-height: 1.6; }
.no-embed-box a { display: inline-block; background: var(--red); color: #fff; text-decoration: none; border-radius: 3px; padding: 12px 24px; font-family: var(--font-display); font-size: 20px; letter-spacing: .1em; }

.home-logo-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 0;
}
.home-logo-img {
  width: min(180px, 42vw);
  height: min(180px, 42vw);
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid var(--red);
  box-shadow: 0 0 32px rgba(230,57,70,0.5), 0 0 8px rgba(230,57,70,0.3);
  margin-bottom: 8px;
}
.home-logo-text {
  font-family: var(--font-display);
  font-size: clamp(52px,14vw,80px);
  letter-spacing: 0.06em;
  color: var(--white);
  line-height: 0.9;
  text-align: center;
}
.home-logo-text span { color: var(--red); }

</style>
</head>

  </div>
  <div class="manual-section">
    <input class="manual-input" id="manual-url" placeholder="Oder Spotify/YouTube-URL eingeben…" type="url">
    <button class="btn-go" onclick="handleManualUrl()">▶</button>
  </div>
</div>

<!-- SCAN -->
<div id="screen-scan" class="screen hidden">
  <div class="scan-header">
    <div class="scan-header-title">NUN<span style="color:var(--red)">STER</span></div>
    <button class="btn-back" onclick="stopScanGoHome()">✕ Abbrechen</button>
  </div>
  <div class="camera-container">
    <video id="camera-video" playsinline autoplay muted></video>
    <canvas id="qr-canvas"></canvas>
    <div id="debug-bar"></div>
    <div class="scan-overlay">
      <div class="scan-frame">
        <div class="c1"></div><div class="c2"></div>
        <div class="scan-line"></div>
      </div>
    </div>
    <div class="scan-status" id="scan-status">Kamera wird gestartet…</div>
  </div>
</div>

<!-- PLAYER -->
<div id="screen-player" class="screen hidden">
  <div class="player-header">
    <div class="player-header-title">NUN<span style="color:var(--red)">STER</span></div>
    <button class="btn-new" onclick="goHome()">↩ Neu scannen</button>
  </div>
  <div class="player-content">
    <div id="embed-container"></div>
    <div class="reveal-card" id="reveal-card">
      <div class="reveal-hidden" id="reveal-hidden" onclick="revealInfo()">
        <span class="reveal-eye">👁</span>
        <div class="reveal-cta">AUFLÖSUNG</div>
        <div class="reveal-sub">Tippen zum Aufdecken</div>
      </div>
      <div class="reveal-shown" id="reveal-shown">
        <div class="reveal-artist" id="info-artist"></div>
        <div class="reveal-year"   id="info-year">?</div>
        <div class="reveal-divider"></div>
        <div class="reveal-title"  id="info-title"></div>
      </div>
    </div>
    <button class="btn-next" onclick="goHome()">NÄCHSTE KARTE ›</button>
    <div class="url-display" id="url-display"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let videoStream  = null;
let scanLoop     = null;
let scanLocked   = false;   // prevents double-fire
let revealData   = {};

// ══════════════════════════════════════════
// SCREENS
// ══════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function goHome() {
  clearEmbed();
  resetReveal();
  showScreen('screen-home');
}

function stopScanGoHome() {
  stopScan();
  goHome();
}

// ══════════════════════════════════════════
// DEBUG (shown on-screen for mobile diagnosis)
// ══════════════════════════════════════════
function dbg(msg) {
  const bar = document.getElementById('debug-bar');
  if (!bar) return;
  bar.style.display = 'block';
  bar.textContent = msg;
}

// ══════════════════════════════════════════
// CAMERA
// ══════════════════════════════════════════
async function startScan() {
  scanLocked = false;
  showScreen('screen-scan');
  setStatus('Kamera wird gestartet…');
  dbg('getUserMedia start');

  try {
    videoStream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });
    const video = document.getElementById('camera-video');
    video.srcObject = videoStream;
    // Don't await play() — on some Android it never resolves
    video.play().catch(() => {});
    // Give video a moment to start before scanning
    setTimeout(() => {
      setStatus('QR-Code in den Rahmen halten');
      dbg('loop start');
      startQRLoop();
    }, 600);
  } catch(err) {
    setStatus('Kamera-Fehler: ' + err.message);
    dbg('camera error: ' + err.message);
  }
}

function startQRLoop() {
  const video  = document.getElementById('camera-video');
  const canvas = document.getElementById('qr-canvas');
  const ctx    = canvas.getContext('2d', { willReadFrequently: true });
  let frameCount = 0;

  function tick() {
    if (scanLocked) return;

    frameCount++;
    if (frameCount % 3 !== 0) {          // scan every 3rd frame (~10fps) to save CPU
      scanLoop = requestAnimationFrame(tick);
      return;
    }

    if (video.readyState >= 2) {          // HAVE_CURRENT_DATA or better
      const w = video.videoWidth;
      const h = video.videoHeight;
      if (w > 0 && h > 0) {
        canvas.width  = w;
        canvas.height = h;
        ctx.drawImage(video, 0, 0, w, h);
        let imageData;
        try {
          imageData = ctx.getImageData(0, 0, w, h);
        } catch(e) {
          scanLoop = requestAnimationFrame(tick);
          return;
        }
        const code = jsQR(imageData.data, w, h, { inversionAttempts: 'dontInvert' });
        if (code && code.data) {
          const raw = code.data.trim();
          dbg('QR: ' + raw);
          scanLocked = true;
          cancelAnimationFrame(scanLoop);
          scanLoop = null;
          stopScan();
          // small delay so stopScan can finish releasing camera
          setTimeout(() => handleScannedData(raw), 150);
          return;
        }
      }
    }
    scanLoop = requestAnimationFrame(tick);
  }

  scanLoop = requestAnimationFrame(tick);
}

function stopScan() {
  if (scanLoop) { cancelAnimationFrame(scanLoop); scanLoop = null; }
  if (videoStream) {
    videoStream.getTracks().forEach(t => { try { t.stop(); } catch(e){} });
    videoStream = null;
  }
  const video = document.getElementById('camera-video');
  try { video.srcObject = null; } catch(e) {}
}

function setStatus(msg) {
  const el = document.getElementById('scan-status');
  if (el) el.textContent = msg;
}

// ══════════════════════════════════════════
// HANDLE SCANNED / ENTERED DATA
// ══════════════════════════════════════════
function handleScannedData(raw) {
  // Format 1: hitster://Künstler|Titel|Jahr|https://...
  if (raw.startsWith('hitster://')) {
    const parts  = raw.slice('hitster://'.length).split('|');
    const artist = tryDecode(parts[0] || '');
    const title  = tryDecode(parts[1] || '');
    const year   = tryDecode(parts[2] || '');
    const url    = tryDecode(parts[3] || '');
    revealData = { artist, title, year };
    loadUrl(url);
    return;
  }

  // Format 2: plain URL
  if (raw.startsWith('http://') || raw.startsWith('https://')) {
    revealData = {};
    loadUrl(raw);
    return;
  }

  // Anything else: show as manual fallback
  setStatus('Kein gültiger Link: ' + raw);
  dbg('unrecognized: ' + raw);
  scanLocked = false;
}

function handleManualUrl() {
  const url = document.getElementById('manual-url').value.trim();
  if (!url) return;
  document.getElementById('manual-url').value = '';
  revealData = {};
  handleScannedData(url);
}

document.getElementById('manual-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleManualUrl();
});

function tryDecode(s) {
  try { return decodeURIComponent(s); } catch(e) { return s; }
}

// ══════════════════════════════════════════
// LOAD URL → EMBED
// ══════════════════════════════════════════
function loadUrl(url) {
  if (!url) { goHome(); return; }

  resetReveal();
  clearEmbed();
  showScreen('screen-player');
  document.getElementById('url-display').textContent = url;

  const container = document.getElementById('embed-container');

  // ── SPOTIFY ─────────────────────────────────────────────────
  // Matches: open.spotify.com/track/ID  (also with query params)
  // Also: spotify.link/xxx  → we can't embed short links, open externally
  const spMatch = url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([A-Za-z0-9]+)/);
  if (spMatch) {
    const type = spMatch[1];
    const id   = spMatch[2];
    const h    = (type === 'track' || type === 'episode') ? 152 : 352;
    const wrap = document.createElement('div');
    wrap.className = 'embed-wrap';
    wrap.innerHTML = `<iframe
      src="https://open.spotify.com/embed/${type}/${id}?utm_source=generator&theme=0"
      height="${h}"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
      loading="lazy"></iframe>`;
    container.appendChild(wrap);
    return;
  }

  // spotify.link short URLs → can't embed, open in app
  if (url.includes('spotify.link') || url.startsWith('spotify:')) {
    showExternalLink(container, url, 'In Spotify öffnen');
    return;
  }

  // ── YOUTUBE ──────────────────────────────────────────────────
  // youtu.be/ID  |  youtube.com/watch?v=ID  |  youtube.com/shorts/ID
  const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?(?:.*&)?v=|shorts\/|embed\/))([A-Za-z0-9_-]{11})/);
  if (ytMatch) {
    const id   = ytMatch[1];
    const wrap = document.createElement('div');
    wrap.className = 'yt-wrap';
    wrap.innerHTML = `<iframe
      src="https://www.youtube.com/embed/${id}?autoplay=1&rel=0&modestbranding=1"
      allow="autoplay; encrypted-media"
      allowfullscreen></iframe>`;
    container.appendChild(wrap);
    return;
  }

  // ── FALLBACK: external link ───────────────────────────────────
  showExternalLink(container, url, 'Link öffnen ↗');
}

function showExternalLink(container, url, label) {
  const box = document.createElement('div');
  box.className = 'no-embed-box';
  box.innerHTML = `
    <p>Kein einbettbarer Spotify- oder YouTube-Link erkannt.<br>
    Du kannst den Link direkt öffnen:</p>
    <a href="${url}" target="_blank" rel="noopener">${label}</a>
    <p style="margin-top:12px;font-size:10px;color:#444;word-break:break-all">${url}</p>
  `;
  container.appendChild(box);
}

// ══════════════════════════════════════════
// REVEAL
// ══════════════════════════════════════════
function resetReveal() {
  document.getElementById('reveal-hidden').style.display = '';
  document.getElementById('reveal-shown').style.display  = 'none';
}

function revealInfo() {
  document.getElementById('reveal-hidden').style.display = 'none';
  document.getElementById('reveal-shown').style.display  = '';

  if (revealData.year || revealData.artist) {
    document.getElementById('info-artist').textContent = revealData.artist || '';
    document.getElementById('info-year').textContent   = revealData.year   || '?';
    document.getElementById('info-title').textContent  = revealData.title  || '';
  } else {
    document.getElementById('info-artist').textContent = '';
    document.getElementById('info-year').textContent   = '?';
    document.getElementById('info-title').textContent  = 'Infos im Player oben sichtbar';
  }
}

function clearEmbed() {
  document.getElementById('embed-container').innerHTML = '';
  document.getElementById('url-display').textContent   = '';
}
</script>
</body>
</html>
